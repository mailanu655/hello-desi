services:
  - type: web
    name: mira
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ACCESS_TOKEN
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: OPEN_EXCHANGE_RATES_APP_ID
        sync: false
      - key: VERSION
        value: "v21.0"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /health
